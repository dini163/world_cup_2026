name: Auto Data Update

on:
  schedule:
    # Runs every hour (at the start of every hour)
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants write permissions to push updates back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate latest news and predictions
        run: |
          python scripts/generate_news.py
          python scripts/generate_predictions.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/predictions.json
          
          # Check if there are actual changes before committing
          if git diff --staged --quiet; then
            echo "No data changes detected. Skipping commit."
          else
            git commit -m "chore(data): auto-update news and predictions [skip ci]"
            git push origin main
          fi
