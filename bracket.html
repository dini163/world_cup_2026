<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="nav_bracket">淘汰赛模拟器 · 2026 FIFA World Cup</title>
  <script>
    (function() {
      const theme = localStorage.getItem('world_cup_theme') || 'dark';
      let actualTheme = theme;
      if (theme === 'auto') {
        actualTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', actualTheme);
    })();
  </script>
  <meta name="description" content="2026世界杯淘汰赛对抗树模拟器 — 模拟从32强淘汰赛、16强、八强、半决赛到决赛的完整晋级路径">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages/bracket.css">
</head>
<body>
  <div id="navPlaceholder"></div>

  <div class="page-wrapper">
    <div class="container-fluid" style="padding: 0 var(--space-4)">
      <div class="page-header" style="max-width: var(--max-width); margin: 0 auto var(--space-8)">
        <h1><span class="text-gradient" data-i18n="bracket_title">淘汰赛对决模拟</span></h1>
        <p data-i18n="bracket_desc">Knockout Bracket · 32强晋级对抗树 · 点击球队直接晋级下一轮</p>
      </div>

      <!-- Control Panel -->
      <div class="bracket-controls">
        <button id="btnAutoSimGroup" class="btn btn-primary" data-i18n="bracket_auto_sim">⚡ 一键模拟小组赛</button>
        <button id="btnResetBracket" class="btn btn-ghost" data-i18n="btn_reset_bracket">🔄 重置淘汰赛</button>
        <button id="btnResetAll" class="btn btn-ghost" data-i18n="btn_reset_all">🚨 重置全部</button>
      </div>

      <!-- Main Bracket Scroll Area -->
      <div class="bracket-scroll-container">
        <div class="bracket-wrapper" id="bracketWrapper">
          <!-- Loading placeholder or content generated by JS -->
          <div class="skeleton-bracket" style="text-align:center; padding:var(--space-12)">
            <div class="skeleton skeleton-card" style="width:260px; height:120px; display:inline-block; margin:var(--space-4)"></div>
            <div class="skeleton skeleton-card" style="width:260px; height:120px; display:inline-block; margin:var(--space-4)"></div>
            <p style="color:var(--text-secondary); margin-top:var(--space-4)">正在加载对抗树图谱...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="footerPlaceholder"></div>

  <script src="js/data-loader.js"></script>
  <script src="js/utils/i18n.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/utils/calculator.js"></script>
  <script src="js/components/navbar.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages/bracket.js"></script>
</body>
</html>
