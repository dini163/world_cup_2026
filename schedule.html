<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="schedule_header">完整赛程 · 2026 FIFA World Cup</title>
  <script>
    (function() {
      const theme = localStorage.getItem('world_cup_theme') || 'dark';
      let actualTheme = theme;
      if (theme === 'auto') {
        actualTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', actualTheme);
    })();
  </script>
  <meta name="description" content="2026世界杯完整104场赛程 — 按日期、小组、阶段筛选，含比赛时间与场馆信息">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages/schedule.css">
</head>
<body>
  <div id="navPlaceholder"></div>

  <div class="page-wrapper">
    <div class="container">
      <div class="page-header">
        <h1><span class="text-gradient" data-i18n="schedule_header">世界杯完整赛程</span></h1>
        <p data-i18n="desc_schedule">104场比赛 · 16座城市 · 2026.6.11 — 7.19</p>
      </div>

      <!-- View Toggle -->
      <div class="schedule-controls">
        <div id="viewToggle"></div>
        <div id="dateNav"></div>
      </div>

      <!-- Calendar -->
      <div id="calendarMini"></div>

      <!-- Schedule Content -->
      <div id="scheduleContent">
        <div class="skeleton skeleton-card" style="height:80px;margin-bottom:var(--space-3)"></div>
        <div class="skeleton skeleton-card" style="height:80px;margin-bottom:var(--space-3)"></div>
        <div class="skeleton skeleton-card" style="height:80px;margin-bottom:var(--space-3)"></div>
        <div class="skeleton skeleton-card" style="height:80px"></div>
      </div>
    </div>
  </div>

  <div id="footerPlaceholder"></div>

  <script src="js/data-loader.js"></script>
  <script src="js/utils/i18n.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/utils/calculator.js"></script>
  <script src="js/components/navbar.js"></script>
  <script src="js/components/match-card.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages/schedule.js"></script>
</body>
</html>
